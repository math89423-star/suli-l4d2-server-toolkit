# ================================================================
# L4D2 地图下载站 + Admin Panel 反向代理
#
# 部署：
#   cp nginx-l4d2-maps.conf /etc/nginx/sites-available/l4d2-maps
#   ln -s /etc/nginx/sites-available/l4d2-maps /etc/nginx/sites-enabled/
#   nginx -t && systemctl reload nginx
#
# 必须修改：所有 ★ 标记项
# ================================================================

server {
    listen 80;
    server_name _;

    # 允许上传大文件（地图 ZIP 可达 2GB）
    client_max_body_size 2G;

    # 大文件上传超时
    client_body_timeout 600s;
    client_header_timeout 60s;

    # 隐藏点文件
    location ~ /\. {
        deny all;
    }

    # favicon — 返回 204 避免控制台 404 噪音
    location = /favicon.ico {
        return 204;
    }

    # 地图下载 — /maps/ → zip 目录
    location /maps/ {
        alias ★ /opt/gameservers/l4d2/admin-panel/maps/zip/;
        autoindex on;
        autoindex_exact_size off;
        autoindex_localtime on;

        location ~* \.(zip|vpk)$ {
            expires 7d;
            add_header Cache-Control "public, immutable";
        }
    }

    # Admin Panel 前端 — 根路径代理到 Flask
    location / {
        proxy_pass http://127.0.0.1:5000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # 大文件上传代理超时
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_request_buffering off;
    }
}
